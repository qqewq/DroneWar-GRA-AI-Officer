<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>GRA Drone Officer Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h1>GRA AI Officer – Дрон-рой</h1>
  <div class="controls">
    <button onclick="startMission()">Запуск миссии</button>
    <input type="range" id="jamming" min="0" max="1" step="0.01" value="0.1">
    <span id="jam-label">Помехи: 0.1</span>
  </div>
  <canvas id="resonanceChart" width="400" height="200"></canvas>
  <div id="metrics">
    <p>Общая резонансность: <span id="resonance">-</span></p>
    <p>Уровень обнуления: <span id="nullification">-</span></p>
    <p>Иерархическая устойчивость: <span id="stability">-</span></p>
  </div>
  <script src="app.js"></script>
</body>
</html>
